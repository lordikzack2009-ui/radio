<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BRATSKOE RADIO | LIVE STREAM</title>
    <style>
        :root {
            --glow-color: #00ff66;
            --bg-gradient: linear-gradient(180deg, #0a0a0c 0%, #111115 100%);
            --panel-bg: rgba(18, 18, 24, 0.75);
            --accent-red: #ff3b30;
        }

        body {
            margin: 0; padding: 0;
            background: var(--bg-gradient); color: #ffffff;
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; overflow: hidden;
        }

        body::before {
            content: ''; position: absolute; width: 300px; height: 300px;
            background: rgba(0, 255, 102, 0.06); border-radius: 50%;
            filter: blur(80px); top: 20%; left: 30%; z-index: 0;
        }

        .main-card {
            position: relative; z-index: 1; background: var(--panel-bg);
            padding: 40px 30px; border-radius: 28px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            max-width: 360px; width: 100%; text-align: center; box-sizing: border-box;
        }

        .radio-glow-icon { font-size: 75px; margin-bottom: 15px; display: inline-block; }
        
        h1 {
            font-size: 26px; font-weight: 800; margin: 0 0 5px 0; letter-spacing: 1px;
            text-transform: uppercase; background: linear-gradient(120deg, #ffffff, #a0a0a5);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        .sub-tag { font-size: 12px; color: #606065; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 25px; }

        .control-wrapper { margin-bottom: 30px; }

        /* Встроенный HTML5 плеер, который браузер не сможет заблокировать */
        audio {
            width: 100%;
            outline: none;
            filter: invert(1) hue-rotate(180deg) cubic-bezier(0.1, 1, 0.1, 1); /* Делает плеер стильно темным */
            border-radius: 12px;
        }

        .warning-box {
            background: rgba(255, 59, 48, 0.08);
            border: 1px solid rgba(255, 59, 48, 0.2);
            border-radius: 16px; padding: 15px; margin-bottom: 25px; text-align: left;
        }

        .warning-box p { margin: 0 0 10px 0; font-size: 12px; color: #ff8882; line-height: 1.4; }

        .btn-bypass {
            display: block; text-align: center; background: var(--accent-red);
            color: #fff; text-decoration: none; font-size: 11px; font-weight: 700;
            padding: 8px 12px; border-radius: 8px; text-transform: uppercase; letter-spacing: 1px;
            transition: background 0.2s;
        }
        .btn-bypass:hover { background: #d63026; }

        .footer-links {
            display: flex; justify-content: center; gap: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.03); padding-top: 20px;
        }

        .footer-link { color: #404045; text-decoration: none; font-size: 11px; font-weight: 600; text-transform: uppercase; }
        .footer-link:hover { color: #fff; }
    </style>
</head>
<body>

<div class="main-card">
    <div class="radio-glow-icon">📻</div>
    <h1>Братский Эфир</h1>
    <div class="sub-tag">HQ LIVE STREAM</div>
    
    <!-- КРИТИЧЕСКИЙ БЛОК: Инструкция для пацанов -->
    <div class="warning-box">
        <p>⚠️ <b>Внимание:</b> Если звук не играет, нужно один раз убрать блокировку бесплатного тарифа. Нажми кнопку ниже, нажми "Proceed" и вернись назад.</p>
        <a href="https://localto.net" target="_blank" class="btn-bypass">1. Снять блок (Жми сюда)</a>
    </div>

    <!-- Железный плеер браузера (без скриптов, работает всегда) -->
    <div class="control-wrapper">
        <audio controls preloaded="none" src="https://localto.net"></audio>
    </div>

    <div class="footer-links">
        <a href="#" class="footer-link">Прямой эфир</a>
        <a href="#" class="footer-link" onclick="alert('Связь в TG/ДС!')">Контакты</a>
    </div>
</div>

</body>
</html>
